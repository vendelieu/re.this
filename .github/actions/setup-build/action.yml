name: 'Setup re.this build environment'
description: 'JDK 17, Gradle, and canonical Konan cache. Assumes the repo is already checked out.'

inputs:
  dependency-graph:
    description: 'gradle/actions/setup-gradle dependency-graph mode (disabled | generate | generate-and-submit)'
    required: false
    default: 'disabled'

runs:
  using: composite
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        gradle-version: current
        dependency-graph: ${{ inputs.dependency-graph }}

    - name: Cache Konan dependencies
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml', '**/*.gradle.kts', 'gradle.properties') }}
        restore-keys: |
          ${{ runner.os }}-konan-
