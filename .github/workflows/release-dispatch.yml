# Manual release: validate CHANGELOG, optionally run build, then create and push tag.
# Pushing the tag triggers the existing Release workflow (publish, GH release).
# Usage: Actions → Release (dispatch) → Run workflow, enter version e.g. 0.4.0

name: Release (dispatch)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.0)'
        required: true
        type: string
      skip_build:
        description: 'Skip build verification (only if master is already green)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-dispatch:
    name: Validate and create tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          V="${{ github.event.inputs.version }}"
          if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be semver (e.g. 0.4.0), got: $V"
            exit 1
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
        id: version

      - name: Verify CHANGELOG has version
        run: grep -q "## ${{ steps.version.outputs.version }}" CHANGELOG.md || (echo "::error::CHANGELOG.md must contain '## ${{ steps.version.outputs.version }}'" && exit 1)

      - name: Set up JDK 17
        if: github.event.inputs.skip_build != 'true'
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        if: github.event.inputs.skip_build != 'true'
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: current

      - name: Cache konan dependencies
        if: github.event.inputs.skip_build != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/libs.versions.toml', '**.gradle.kts', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache KSP generated sources
        if: github.event.inputs.skip_build != 'true'
        uses: actions/cache@v5
        with:
          path: client/build/generated/ksp
          key: ${{ runner.os }}-ksp-generated-${{ hashFiles('api-processor/**', 'client/src/commonMain/kotlin/eu/vendeli/rethis/api/spec/**') }}

      - name: Run build (optional)
        if: github.event.inputs.skip_build != 'true'
        run: ./gradlew koverXmlReport

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          V="${{ steps.version.outputs.version }}"
          git tag "$V"
          git push origin "$V"
