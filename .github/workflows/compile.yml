name: compile

on:
  pull_request:
    branches:
      - dev
    paths-ignore:
      - '.editorconfig'
      - '.gitignore'
      - 'CHANGELOG.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'FUNDING.yml'
      - 'LICENSE'
      - 'README.md'
      - 'SECURITY.md'
      - 'gradlew'
      - 'gradlew.bat'
      - 'parse_changelog.sh'
      - 'renovate.json'
      - '.github/**'
      - 'assets/**'

jobs:
  compile:
    runs-on: namespace-profile-rthis
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: current

      - name: Cache konan dependencies
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/libs.versions.toml', '**.gradle.kts', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache KSP generated sources
        uses: actions/cache@v5
        with:
          path: client/build/generated/ksp
          key: ${{ runner.os }}-ksp-generated-${{ hashFiles('api-processor/**', 'client/src/commonMain/kotlin/eu/vendeli/rethis/api/spec/**') }}

      - name: Compile
        run: ./gradlew assemble
        timeout-minutes: 15
